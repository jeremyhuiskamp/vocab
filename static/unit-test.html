<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Unit Tests</title>
  <style>
    body     { font-family: monospace; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    h1       { font-size: 1.1em; margin-bottom: 1.5rem; }
    .suite   { margin-bottom: 1.25rem; }
    .suite-name { font-weight: bold; margin-bottom: 0.4rem; }
    .result  { padding: 3px 6px; border-radius: 3px; margin: 2px 0; font-size: 0.9em; }
    .pass    { background: #d4edda; color: #155724; }
    .fail    { background: #f8d7da; color: #721c24; }
    .detail  { opacity: 0.8; margin: 2px 0 4px 1.5em; font-size: 0.85em; }
    .section { font-style: italic; margin: 0.5rem 0 0.2rem 0.5em; font-size: 0.9em; }
    #summary-top {
      position: sticky; top: 0;
      padding: 0.5rem 0.75rem;
      font-weight: bold;
      border-bottom: 1px solid #ccc;
      margin-bottom: 1rem;
    }
    #summary-top.pass { background: #d4edda; color: #155724; }
    #summary-top.fail { background: #f8d7da; color: #721c24; }
    #summary-bottom { font-weight: bold; margin-top: 1rem; padding-top: 0.75rem; border-top: 1px solid #ccc; }
  </style>
</head>
<body>
  <h1>Unit Tests</h1>
  <div id="summary-top"></div>
  <div id="results"></div>
  <div id="summary-bottom"></div>

  <script type="module">
    import { Harness } from './test-harness.js';
    import { cliSuites, domSuites } from './test-suites.js';

    const suites = [...cliSuites, ...domSuites];

    const container = document.getElementById('results');
    let totalPass = 0, totalFail = 0;

    for (const suite of suites) {
      const h = new Harness();
      try { await suite.run(h); } catch(err) {
        h.results.push({ ok: false, description: '(suite crashed)', actual: String(err), expected: '(no error)' });
      }

      const testResults = h.results.filter(r => r.type !== 'section');
      const suitePass = testResults.filter(r => r.ok).length;
      const suiteFail = testResults.filter(r => !r.ok).length;
      totalPass += suitePass;
      totalFail += suiteFail;

      const suiteEl = document.createElement('div');
      suiteEl.className = 'suite';

      const nameEl = document.createElement('div');
      nameEl.className = 'suite-name';
      nameEl.textContent = `${suite.name}  (${suitePass}/${testResults.length})`;
      suiteEl.appendChild(nameEl);

      for (const r of h.results) {
        if (r.type === 'section') {
          const sectionEl = document.createElement('div');
          sectionEl.className = 'section';
          sectionEl.textContent = r.name;
          suiteEl.appendChild(sectionEl);
          continue;
        }
        const row = document.createElement('div');
        row.className = 'result ' + (r.ok ? 'pass' : 'fail');
        row.textContent = (r.ok ? '✓ ' : '✗ ') + r.description;
        suiteEl.appendChild(row);
        if (!r.ok) {
          const detail = document.createElement('div');
          detail.className = 'detail';
          detail.innerHTML = `expected: ${r.expected}<br>got:&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;${r.actual}`;
          suiteEl.appendChild(detail);
        }
      }

      container.appendChild(suiteEl);
    }

    const summaryText = `${totalPass + totalFail} tests — ${totalPass} passed, ${totalFail} failed.`;
    const summaryTop = document.getElementById('summary-top');
    summaryTop.textContent = summaryText;
    summaryTop.className = totalFail > 0 ? 'fail' : 'pass';
    document.getElementById('summary-bottom').textContent = summaryText;
  </script>
</body>
</html>
