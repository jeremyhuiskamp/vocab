<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Vocab — Practise</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link
    href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="common.css">
  <style>
    .btn:hover {
      background: var(--accent-hover);
    }

    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .practice-card {
      position: relative;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1rem 1.25rem;
      margin-bottom: 1rem;
    }

    .practice-card.incorrect {
      border-color: var(--danger);
    }

    .question-stats {
      position: absolute;
      top: 0.6rem;
      right: 0.75rem;
      font-size: 0.8rem;
      color: var(--muted);
    }

    .practice-card .english {
      color: var(--muted);
      font-size: 0.95rem;
      margin-bottom: 0.5rem;
    }

    .practice-card .foreign {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.25rem;
    }

    .practice-card .foreign .gap {
      flex: none;
      min-width: 8rem;
      padding: 0.4rem 0.5rem;
      font-size: 1rem;
    }

    .practice-card .foreign .text {
      font-size: 1rem;
    }

    .submit-row {
      margin-top: 1.5rem;
    }

    .result-feedback {
      font-size: 0.9rem;
    }

    .result-feedback.correct {
      color: var(--success);
    }

    .result-feedback.incorrect {
      color: var(--danger);
    }

    .result-feedback .expected {
      color: var(--muted);
    }

    .next-hint {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 1rem;
    }

    .stats-bar {
      display: flex;
      gap: 1.5rem;
      margin: 1rem 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .stats-bar .stat-value {
      color: var(--text);
      font-weight: 600;
    }

    .stats-bar .needs-work .stat-value {
      color: var(--danger);
    }
  </style>
</head>

<body>
  <nav class="top-nav">
    <a href="/">Create</a>
    <a href="/practise.html" class="active">Practise</a>
  </nav>
  <div class="container">
    <h1>Vocab — Practise</h1>
    <p class="sub">Choose a unit and fill in the missing words. Tab through the blanks, then Submit. After reviewing,
      press Enter for the next set.</p>

    <div class="form-row">
      <label for="unit-select">Unit</label>
      <select id="unit-select">
        <option value="">— Select unit —</option>
      </select>
    </div>

    <div id="no-unit" class="sub">Select a unit to load its sentences.</div>
    <div id="stats-bar" class="stats-bar" hidden>
      <span>Total: <span class="stat-value" id="stat-total">0</span></span>
      <span><span id="stat-answered-label">Answered ×1</span>: <span class="stat-value" id="stat-answered">0</span></span>
      <span class="needs-work">Needs work: <span class="stat-value" id="stat-needs-work">0</span></span>
    </div>
    <div id="practice-area" hidden>
      <div id="questions-container"></div>
      <div class="submit-row">
        <button type="button" class="btn" id="submit-btn">Submit</button>
      </div>
    </div>
    <div id="result-area" hidden>
      <div id="result-container"></div>
      <p class="next-hint">Press Enter, Space, or Tab for next 5 questions.</p>
    </div>
  </div>

  <script type="module">
    import { flattenUnit, getQuestionPriority, selectNextQuestions, gradeAnswers } from './practise-logic.js';
    import { escapeHtml } from './utils.js';

    const unitSelectEl = document.getElementById('unit-select');
    const noUnitEl = document.getElementById('no-unit');
    const statsBarEl = document.getElementById('stats-bar');
    const statTotalEl = document.getElementById('stat-total');
    const statAnsweredLabelEl = document.getElementById('stat-answered-label');
    const statAnsweredEl = document.getElementById('stat-answered');
    const statNeedsWorkEl = document.getElementById('stat-needs-work');
    const practiceAreaEl = document.getElementById('practice-area');
    const questionsContainerEl = document.getElementById('questions-container');
    const submitBtn = document.getElementById('submit-btn');
    const resultAreaEl = document.getElementById('result-area');
    const resultContainerEl = document.getElementById('result-container');

    let unit = null;
    let allQuestions = [];
    let sessionStats = {};
    let currentSet = [];
    let tabIndexCounter = 1;

    function updateStats() {
      const total = allQuestions.length;

      const minAttempts = allQuestions.length === 0 ? 0
        : Math.min(...allQuestions.map(q => sessionStats[q.id]?.attempts || 0));
      const threshold = minAttempts + 1;

      let answered = 0;
      let needsWork = 0;
      allQuestions.forEach(q => {
        const s = sessionStats[q.id];
        if ((s?.attempts || 0) >= threshold) answered++;
        if (s && s.attempts > 0 && s.correct / s.attempts < 0.75) needsWork++;
      });

      statTotalEl.textContent = total;
      statAnsweredLabelEl.textContent = 'Answered ' + threshold + '×';
      statAnsweredEl.textContent = answered;
      statNeedsWorkEl.textContent = needsWork;
    }

    function renderQuestionView() {
      resultAreaEl.hidden = true;
      practiceAreaEl.hidden = false;
      questionsContainerEl.innerHTML = '';
      tabIndexCounter = 1;

      currentSet.forEach((q, qIdx) => {
        const card = document.createElement('div');
        card.className = 'practice-card';
        card.innerHTML = '<div class="english">' + escapeHtml(q.english) + '</div>';
        const s = sessionStats[q.id];
        if (s && s.attempts > 0) {
          const statsEl = document.createElement('span');
          statsEl.className = 'question-stats';
          statsEl.textContent = s.correct + ' / ' + s.attempts;
          card.appendChild(statsEl);
        }
        const foreign = document.createElement('div');
        foreign.className = 'foreign';
        q.fragments.forEach((frag, fi) => {
          if (frag.is_target) {
            const input = document.createElement('input');
            input.type = 'text';
            input.className = 'gap';
            input.placeholder = '…';
            input.dataset.questionId = q.id;
            input.dataset.fragIndex = String(fi);
            input.tabIndex = tabIndexCounter++;
            foreign.appendChild(input);
          } else {
            const span = document.createElement('span');
            span.className = 'text';
            span.textContent = frag.text;
            foreign.appendChild(span);
          }
        });
        card.appendChild(foreign);
        questionsContainerEl.appendChild(card);
      });

      submitBtn.tabIndex = tabIndexCounter;
      const allInputs = Array.from(questionsContainerEl.querySelectorAll('input.gap'));
      if (allInputs.length > 0) {
        allInputs[0].focus();
        allInputs[allInputs.length - 1].addEventListener('keydown', (e) => {
          if (e.key === 'Tab' && !e.shiftKey && allInputs.every(inp => inp.value.trim() !== '')) {
            e.preventDefault();
            gradeAndShowResult();
          }
        });
        allInputs.forEach((inp, i) => {
          inp.addEventListener('keydown', (e) => {
            if (e.key !== ' ' || inp.value.trim() === '') return;
            e.preventDefault();
            if (i < allInputs.length - 1) {
              allInputs[i + 1].focus();
            } else if (allInputs.every(inp => inp.value.trim() !== '')) {
              gradeAndShowResult();
            } else {
              submitBtn.focus();
            }
          });
        });
      }
    }

    function gradeAndShowResult() {
      const results = gradeAnswers(currentSet, sessionStats, (questionId, fragIndex) => {
        const inputs = questionsContainerEl.querySelectorAll(`input[data-question-id="${questionId}"]`);
        const input = Array.from(inputs).find(inp => inp.dataset.fragIndex === String(fragIndex));
        return input ? input.value.trim() : '';
      });

      updateStats();
      practiceAreaEl.hidden = true;
      resultAreaEl.hidden = false;
      resultContainerEl.innerHTML = '';

      results.forEach(({ q, answers, allCorrect }) => {
        const card = document.createElement('div');
        card.className = 'practice-card' + (allCorrect ? '' : ' incorrect');
        card.innerHTML = '<div class="english">' + escapeHtml(q.english) + '</div>';
        const s = sessionStats[q.id];
        const statsEl = document.createElement('span');
        statsEl.className = 'question-stats';
        statsEl.textContent = s.correct + ' / ' + s.attempts;
        card.appendChild(statsEl);
        const foreign = document.createElement('div');
        foreign.className = 'foreign';
        let ai = 0;
        q.fragments.forEach((frag) => {
          if (frag.is_target) {
            const a = answers[ai++];
            const wrap = document.createElement('span');
            wrap.className = 'result-feedback ' + (a.correct ? 'correct' : 'incorrect');
            wrap.textContent = a.value || '(empty)';
            if (!a.correct) {
              const exp = document.createElement('span');
              exp.className = 'expected';
              exp.textContent = ' → ' + a.expected;
              wrap.appendChild(exp);
            }
            foreign.appendChild(wrap);
          } else {
            const span = document.createElement('span');
            span.className = 'text';
            span.textContent = frag.text;
            foreign.appendChild(span);
          }
        });
        card.appendChild(foreign);
        resultContainerEl.appendChild(card);
      });

      document.addEventListener('keydown', onResultKeydown);
    }

    function onResultKeydown(e) {
      if (!['Enter', ' ', 'Tab'].includes(e.key) || e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') return;
      e.preventDefault();
      document.removeEventListener('keydown', onResultKeydown);
      startNextSet();
    }

    function startNextSet() {
      currentSet = selectNextQuestions(allQuestions, sessionStats, 5);
      if (currentSet.length === 0) {
        resultAreaEl.hidden = true;
        noUnitEl.hidden = false;
        practiceAreaEl.hidden = true;
        noUnitEl.textContent = 'No more sentences in this unit.';
        return;
      }
      renderQuestionView();
    }

    submitBtn.addEventListener('click', () => {
      gradeAndShowResult();
    });

    document.addEventListener('keydown', (e) => {
      if (e.key !== 'Enter') return;
      if (resultAreaEl.hidden === false) return;
      const active = document.activeElement;
      if (active === submitBtn) {
        e.preventDefault();
        gradeAndShowResult();
      } else if (active && active.classList.contains('gap')) {
        const inputs = Array.from(questionsContainerEl.querySelectorAll('input.gap'));
        if (inputs.every(inp => inp.value.trim() !== '')) {
          e.preventDefault();
          gradeAndShowResult();
        }
      }
    });

    unitSelectEl.addEventListener('change', async () => {
      const slug = unitSelectEl.value;
      if (!slug) {
        unit = null;
        allQuestions = [];
        noUnitEl.hidden = false;
        statsBarEl.hidden = true;
        practiceAreaEl.hidden = true;
        resultAreaEl.hidden = true;
        noUnitEl.textContent = 'Select a unit to load its sentences.';
        return;
      }
      try {
        const res = await fetch('/vocab/units/' + encodeURIComponent(slug));
        if (!res.ok) throw new Error('Failed to load unit');
        unit = await res.json();
        allQuestions = flattenUnit(unit);
        sessionStats = {};
        statsBarEl.hidden = false;
        updateStats();
        noUnitEl.hidden = true;
        startNextSet();
      } catch (err) {
        noUnitEl.textContent = 'Failed to load unit.';
        noUnitEl.hidden = false;
      }
    });

    (async function loadUnits() {
      try {
        const res = await fetch('/vocab/units');
        if (!res.ok) return;
        const list = await res.json();
        list.forEach(u => {
          const opt = document.createElement('option');
          opt.value = u.slug;
          opt.textContent = u.name;
          unitSelectEl.appendChild(opt);
        });
      } catch (_) { }
    })();
  </script>
</body>

</html>
