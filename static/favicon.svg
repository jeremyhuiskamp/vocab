<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e"/>
      <stop offset="100%" style="stop-color:#16213e"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c23152"/>
    </linearGradient>
    <linearGradient id="card2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f3460"/>
      <stop offset="100%" style="stop-color:#1a4a7a"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f5a623"/>
      <stop offset="100%" style="stop-color:#f7c948"/>
    </linearGradient>
  </defs>

  <!-- Background rounded square -->
  <rect width="32" height="32" rx="6" fill="url(#bg)"/>

  <!-- Back flashcard (tilted slightly) -->
  <rect x="5" y="8" width="18" height="13" rx="2" fill="url(#card2)" transform="rotate(-6 14 14.5)" opacity="0.85"/>

  <!-- Front flashcard -->
  <rect x="8" y="10" width="18" height="13" rx="2" fill="url(#card1)"/>

  <!-- Letter "A" on front card (foreign language side) -->
  <text x="17" y="20" font-family="Georgia, serif" font-size="9" font-weight="bold" fill="white" text-anchor="middle" opacity="0.95">A</text>

  <!-- Small star/check — "learned" indicator -->
  <circle cx="24" cy="11" r="3.5" fill="url(#accent)"/>
  <text x="24" y="13.5" font-family="Arial" font-size="5" font-weight="bold" fill="#1a1a2e" text-anchor="middle">✓</text>

  <!-- Repeat/practice arrow at bottom -->
  <path d="M9 26 Q16 23 23 26" stroke="#f5a623" stroke-width="1.5" fill="none" stroke-linecap="round" opacity="0.8"/>
  <polygon points="23,24.5 25,26 23,27.5" fill="#f5a623" opacity="0.8"/>
</svg>
